<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <style>
    text{font-family:Arial,Helvetica,sans-serif;fill:#111827}
    .muted{fill:#4b5563}
    .grid{stroke:#e5e7eb;stroke-width:1}
    .axis{stroke:#6b7280;stroke-width:1.2}
    .json{fill:#2563eb}
    .ws{fill:#15803d}
    .udp{fill:#ea580c}
  </style>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="42" y="42" font-size="24" font-weight="700">V2.1 Boundary Inclusion Loss By Relay Profile</text>
  <text x="42" y="68" class="muted" font-size="14">24 nodes, degree 8, 60,000 Bitcoin-block boundaries per profile. Split rate can be high while actual slot loss remains bounded.</text>

  <text x="80" y="112" font-size="16" font-weight="700">Snapshot-boundary split rate</text>
  <line x1="80" y1="260" x2="420" y2="260" class="axis"/>
  <line x1="80" y1="130" x2="80" y2="260" class="axis"/>
  <line x1="80" y1="216.7" x2="420" y2="216.7" class="grid"/>
  <line x1="80" y1="173.3" x2="420" y2="173.3" class="grid"/>
  <line x1="80" y1="130" x2="420" y2="130" class="grid"/>
  <text x="72" y="264" text-anchor="end" class="muted" font-size="11">0%</text>
  <text x="72" y="220.7" text-anchor="end" class="muted" font-size="11">20%</text>
  <text x="72" y="177.3" text-anchor="end" class="muted" font-size="11">40%</text>
  <text x="72" y="134" text-anchor="end" class="muted" font-size="11">60%</text>
  <rect class="json" x="126" y="127.8" width="52" height="132.2"/>
  <rect class="ws" x="214" y="234.8" width="52" height="25.2"/>
  <rect class="udp" x="302" y="259.9" width="52" height="0.1"/>
  <text x="152" y="282" text-anchor="middle" class="muted" font-size="11">JSON</text>
  <text x="240" y="282" text-anchor="middle" class="muted" font-size="11">Compact</text>
  <text x="328" y="282" text-anchor="middle" class="muted" font-size="11">UDP</text>
  <text x="152" y="120" text-anchor="middle" font-size="12">61.0%</text>
  <text x="240" y="228" text-anchor="middle" font-size="12">11.6%</text>
  <text x="328" y="252" text-anchor="middle" font-size="12">0.055%</text>

  <text x="540" y="112" font-size="16" font-weight="700">Mean missing shared slots per node</text>
  <line x1="540" y1="260" x2="900" y2="260" class="axis"/>
  <line x1="540" y1="130" x2="540" y2="260" class="axis"/>
  <line x1="540" y1="216.7" x2="900" y2="216.7" class="grid"/>
  <line x1="540" y1="173.3" x2="900" y2="173.3" class="grid"/>
  <line x1="540" y1="130" x2="900" y2="130" class="grid"/>
  <text x="532" y="264" text-anchor="end" class="muted" font-size="11">0</text>
  <text x="532" y="220.7" text-anchor="end" class="muted" font-size="11">0.08</text>
  <text x="532" y="177.3" text-anchor="end" class="muted" font-size="11">0.16</text>
  <text x="532" y="134" text-anchor="end" class="muted" font-size="11">0.24</text>
  <rect class="json" x="590" y="131.4" width="52" height="128.6"/>
  <rect class="ws" x="688" y="252.5" width="52" height="7.5"/>
  <rect class="udp" x="786" y="260.0" width="52" height="0.02"/>
  <text x="616" y="282" text-anchor="middle" class="muted" font-size="11">JSON</text>
  <text x="714" y="282" text-anchor="middle" class="muted" font-size="11">Compact</text>
  <text x="812" y="282" text-anchor="middle" class="muted" font-size="11">UDP</text>
  <text x="616" y="124" text-anchor="middle" font-size="12">0.238 / 299</text>
  <text x="714" y="246" text-anchor="middle" font-size="12">0.0138</text>
  <text x="812" y="252" text-anchor="middle" font-size="12">0.000027</text>

  <rect x="70" y="330" width="840" height="120" fill="#f8fafc" stroke="#cbd5e1" rx="8"/>
  <text x="92" y="360" font-size="15" font-weight="700">Interpretation</text>
  <text x="92" y="386" class="muted" font-size="13">JSON/HTTP has frequent boundary disagreement, but the modeled average loss is about 0.24 of 299 shared slots per node.</text>
  <text x="92" y="410" class="muted" font-size="13">Compact relay cuts slot-pair loss by about 17.2x versus JSON; UDP-fast cuts it by about 8,770x.</text>
  <text x="92" y="434" class="muted" font-size="13">Bandwidth is not the limiting factor in this scenario: about 10.9 MB/day for JSON and 4.4 MB/day for compact/UDP.</text>
</svg>
