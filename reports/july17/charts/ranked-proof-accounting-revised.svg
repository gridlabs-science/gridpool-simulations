<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Conventional share accounting compared with GridPool ranked proof accounting</title>
  <desc id="desc">Conventional pools count accepted shares at assigned difficulty. GridPool ranks proofs by achieved difficulty, retains a bounded reserve, and snapshots the best unpaid proofs into fixed-value payout slots.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8f5; }
      .panel { fill: #ffffff; stroke: #27332d; stroke-width: 2; rx: 18; }
      .title { font: 700 28px sans-serif; fill: #142019; }
      .head { font: 700 21px sans-serif; fill: #142019; }
      .body { font: 17px sans-serif; fill: #27332d; }
      .small { font: 15px sans-serif; fill: #4a5a51; }
      .mono { font: 16px monospace; fill: #142019; }
      .line { stroke: #65776d; stroke-width: 2; marker-end: url(#arrow); }
      .share { fill: #dfe7e1; stroke: #65776d; stroke-width: 1.5; rx: 8; }
      .rank { fill: #d8ead9; stroke: #2f6844; stroke-width: 1.5; rx: 8; }
      .snapshot { fill: #f3d994; stroke: #876618; stroke-width: 2; rx: 12; }
      .note { fill: #e8f2ec; stroke: #2f6844; stroke-width: 1.5; rx: 12; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#65776d"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text class="title" x="600" y="45" text-anchor="middle">One statistical inversion changes the accounting model</text>

  <rect class="panel" x="45" y="78" width="520" height="500"/>
  <text class="head" x="75" y="120">Conventional pool ledger</text>
  <text class="body" x="75" y="154">The pool sets a target difficulty before hashing.</text>
  <rect class="share" x="78" y="185" width="135" height="54"/>
  <rect class="share" x="238" y="185" width="135" height="54"/>
  <rect class="share" x="398" y="185" width="135" height="54"/>
  <text class="mono" x="145" y="219" text-anchor="middle">D = 1,024</text>
  <text class="mono" x="305" y="219" text-anchor="middle">D = 1,024</text>
  <text class="mono" x="465" y="219" text-anchor="middle">D = 1,024</text>
  <line class="line" x1="305" y1="248" x2="305" y2="300"/>
  <rect class="note" x="106" y="310" width="398" height="95"/>
  <text class="body" x="305" y="344" text-anchor="middle">Credit = accepted share count</text>
  <text class="body" x="305" y="374" text-anchor="middle">x assigned difficulty</text>
  <text class="small" x="305" y="435" text-anchor="middle">A much better hash normally earns no extra</text>
  <text class="small" x="305" y="459" text-anchor="middle">ledger credit unless it is a Bitcoin block.</text>
  <text class="small" x="305" y="515" text-anchor="middle">Requires a trusted or replicated accounting ledger.</text>

  <rect class="panel" x="635" y="78" width="520" height="500"/>
  <text class="head" x="665" y="120">GridPool proof set</text>
  <text class="body" x="665" y="154">The hash itself reveals achieved difficulty.</text>
  <rect class="rank" x="668" y="180" width="454" height="45"/>
  <rect class="rank" x="684" y="233" width="438" height="45"/>
  <rect class="rank" x="700" y="286" width="422" height="45"/>
  <rect class="rank" x="716" y="339" width="406" height="45"/>
  <text class="mono" x="690" y="209">#1  D = 18.4B</text>
  <text class="mono" x="706" y="262">#2  D = 9.1B</text>
  <text class="mono" x="722" y="315">#3  D = 7.8B</text>
  <text class="mono" x="738" y="368">...</text>
  <text class="small" x="895" y="411" text-anchor="middle">bounded unpaid reserve: top 897</text>
  <line class="line" x1="895" y1="426" x2="895" y2="460"/>
  <rect class="snapshot" x="693" y="470" width="404" height="76"/>
  <text class="body" x="895" y="500" text-anchor="middle">Bitcoin block boundary snapshots</text>
  <text class="body" x="895" y="528" text-anchor="middle">up to 299 fixed-value shared slots</text>

  <rect class="note" x="185" y="605" width="830" height="52"/>
  <text class="body" x="600" y="637" text-anchor="middle">Rank determines inclusion; achieved difficulty is evidence of work, not a proportional payout multiplier.</text>
</svg>
