<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#111827}
      .muted{fill:#4b5563}
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:2;rx:8}
      .event{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:8}
      .pay{fill:#ecfdf5;stroke:#15803d;stroke-width:2;rx:8}
      .warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:8}
      .arrow{stroke:#374151;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .carry{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:7 5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="42" y="42" font-size="24" font-weight="700">GridPool V2.1 Snapshot/Reserve State Transition</text>
  <text x="42" y="68" class="muted" font-size="14">Snapshots lock payout templates; unpaid reserve proofs persist until they are actually paid.</text>

  <rect class="box" x="42" y="118" width="180" height="96"/>
  <text x="132" y="150" text-anchor="middle" font-size="17" font-weight="700">Unpaid Work Set</text>
  <text x="132" y="174" text-anchor="middle" class="muted" font-size="13">valid unpaid proofs</text>
  <text x="132" y="194" text-anchor="middle" class="muted" font-size="13">bounded reserve: 897</text>

  <rect class="event" x="282" y="118" width="170" height="96"/>
  <text x="367" y="150" text-anchor="middle" font-size="17" font-weight="700">Bitcoin Block</text>
  <text x="367" y="174" text-anchor="middle" class="muted" font-size="13">boundary observed</text>
  <text x="367" y="194" text-anchor="middle" class="muted" font-size="13">snapshot created</text>

  <rect class="box" x="512" y="118" width="180" height="96"/>
  <text x="602" y="150" text-anchor="middle" font-size="17" font-weight="700">Active Snapshot</text>
  <text x="602" y="174" text-anchor="middle" class="muted" font-size="13">payout template</text>
  <text x="602" y="194" text-anchor="middle" class="muted" font-size="13">slot 0 + shared slots</text>

  <rect class="pay" x="752" y="118" width="180" height="96"/>
  <text x="842" y="150" text-anchor="middle" font-size="17" font-weight="700">GridPool Block</text>
  <text x="842" y="174" text-anchor="middle" class="muted" font-size="13">pays active snapshot</text>
  <text x="842" y="194" text-anchor="middle" class="muted" font-size="13">finder gets slot 0</text>

  <path class="arrow" d="M 222 166 L 282 166"/>
  <path class="arrow" d="M 452 166 L 512 166"/>
  <path class="arrow" d="M 692 166 L 752 166"/>

  <rect class="pay" x="512" y="286" width="180" height="92"/>
  <text x="602" y="318" text-anchor="middle" font-size="17" font-weight="700">Paid Lineage</text>
  <text x="602" y="342" text-anchor="middle" class="muted" font-size="13">remove paid proof IDs</text>
  <text x="602" y="362" text-anchor="middle" class="muted" font-size="13">exactly once</text>

  <rect class="box" x="282" y="286" width="170" height="92"/>
  <text x="367" y="318" text-anchor="middle" font-size="17" font-weight="700">Reserve Carries</text>
  <text x="367" y="342" text-anchor="middle" class="muted" font-size="13">unpaid proofs remain</text>
  <text x="367" y="362" text-anchor="middle" class="muted" font-size="13">eligible later</text>

  <path class="arrow" d="M 752 214 C 740 278 702 318 692 332"/>
  <path class="arrow" d="M 512 332 L 452 332"/>
  <path class="carry" d="M 282 332 C 160 332 132 280 132 214"/>

  <rect class="warn" x="42" y="420" width="890" height="58"/>
  <text x="62" y="444" font-size="15" font-weight="700">Boundary rule:</text>
  <text x="174" y="444" font-size="15">late previous-parent proofs after local Bitcoin-block observation do not rewrite the active snapshot.</text>
  <text x="62" y="466" class="muted" font-size="13">Compatible current-parent proofs can still merge forward into the unpaid Work Set after validation.</text>
</svg>
